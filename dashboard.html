    <script>
function typeWriter(element, text, speed = 40) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

document.addEventListener("DOMContentLoaded", () => {
    const terminal = document.querySelector(".terminal-live");
    if (terminal) {
        const text = "> initializing anonlab terminal...\n"
                   + "> loading modules...\n"
                   + "> system online.\n";
        typeWriter(terminal, text, 35);
    }
});
</script>
