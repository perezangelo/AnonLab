<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SOC Dashboard — Monitoraggio Cyber in Tempo Reale | AnonLab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="SOC Dashboard di AnonLab: Threat Level, Attacchi rilevati, Event Log, System Status e monitoraggio cyber in tempo reale.">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/custom.css">
</head>

<body class="dark-mode">

<div id="app" class="gpu-boost">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- TICKER -->
  <div id="ticker"></div>

  <main class="page">
    <section class="main-column">

      <!-- COUNTER -->
      <h1 class="page-title">SOC Dashboard</h1>

      <p class="cyber-intro">
        Monitoraggio in tempo reale dello stato dei sistemi, livello di minaccia,
        log eventi e attività di rete.
      </p>

      <div class="soc-grid">

        <!-- THREAT LEVEL -->
        <div class="soc-card threat-card">
          <h2>Threat Level</h2>
          <div id="threat-level" class="dash-number">--</div>
        </div>

        <!-- GRAFICO ATTACCHI -->
        <div class="soc-card">
          <h2>Attacchi rilevati (ultime 24h)</h2>
          <canvas id="attacksChart"></canvas>
        </div>

        <!-- EVENT LOG -->
        <div class="soc-card log-card">
          <h2>Event Log</h2>
          <div id="event-log" class="event-log"></div>
        </div>

        <!-- SYSTEM STATUS -->
        <div class="soc-card">
          <h2>System Status</h2>
          <ul class="system-status">
            <li>CPU Load: <span id="cpu-load" class="dash-number">--%</span></li>
            <li>Network Activity: <span id="net-activity" class="dash-number">-- kb/s</span></li>
            <li>Firewall Status: <span id="fw-status" class="dash-number">--</span></li>
          </ul>
        </div>

        <!-- MINI THREAT MAP -->
        <div class="soc-card">
          <h2>Threat Map</h2>
          <img src="/img/threat-map-placeholder.png" alt="Threat Map" class="map-img">
        </div>

        <!-- ATTIVITÀ SOSPETTE -->
        <div class="soc-card">
          <h2>Attività sospette</h2>
          <ul id="suspicious-list" class="suspicious-list"></ul>
        </div>

      </div> <!-- /soc-grid -->

    </section>

    <!-- SIDEBAR -->
    <div id="sidebar"></div>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- SCRIPT -->
  <script src="/js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/js/dashboard.js"></script>

</div>

</body>
</html>
