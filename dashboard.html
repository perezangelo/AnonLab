<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SOC Dashboard — Monitoraggio Cyber in Tempo Reale | AnonLab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO BASE -->
  <meta name="description" content="SOC Dashboard di AnonLab: Threat Level, Attacchi rilevati, Event Log, System Status e monitoraggio cyber in tempo reale.">
  <meta name="author" content="AnonLab">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/custom.css">
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- TICKER -->
  <div id="ticker"></div>

  <!-- STRUTTURA IDENTICA ALLE ALTRE SCHEDE -->
  <main class="page">

    <!-- COLONNA PRINCIPALE -->
    <section class="main-column">

      <!-- TITOLO PAGINA -->
      <h1 class="page-title">SOC Dashboard</h1>

      <!-- INTRO (FACOLTATIVA, COME NELLE ALTRE SCHEDE) -->
      <p class="cyber-intro">
        Monitoraggio in tempo reale dello stato dei sistemi, livello di minaccia,
        log eventi e attività di rete.
      </p>

      <!-- LE TUE CARD SOC ORIGINALI -->
      <div class="soc-grid">

        <!-- THREAT LEVEL -->
        <div class="soc-card threat-card">
          <h2>Threat Level</h2>
          <div id="threat-level" class="threat-level dash-number">--</div>
        </div>

        <!-- GRAFICO ATTACCHI -->
        <div class="soc-card">
          <h2>Attacchi rilevati (ultime 24h)</h2>
          <canvas id="attacksChart"></canvas>
        </div>

        <!-- EVENT LOG -->
        <div class="soc-card log-card">
          <h2>Event Log</h2>
          <div id="event-log" class="event-log"></div>
        </div>

        <!-- SYSTEM STATUS -->
        <div class="soc-card">
          <h2>System Status</h2>
          <ul class="system-status">
            <li>CPU Load: <span id="cpu-load" class="dash-number">--%</span></li>
            <li>Network Activity: <span id="net-activity" class="dash-number">-- kb/s</span></li>
            <li>Firewall Status: <span id="fw-status" class="dash-number">--</span></li>
          </ul>
        </div>

      </div>

    </section>

    <!-- SIDEBAR IDENTICA ALLE ALTRE SCHEDE -->
    <div id="sidebar"></div>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- SCRIPT GLOBALI -->
  <script src="/js/ui.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/meteo.js"></script>
  <script src="/js/oroscopo.js"></script>

  <!-- CHART.JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- DASHBOARD JS -->
  <script src="/js/dashboard.js"></script>

</body>
</html>
