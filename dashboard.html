<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — AnonLab</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <div id="header"></div>
  <div id="ticker"></div>

  <main class="page">
    <section class="main-column">
      <h1 class="page-title">SOC Dashboard</h1>

      <div class="dashboard-grid">

        <div class="dash-card">
          <h3>Alert Attivi</h3>
          <p class="dash-number">12</p>
        </div>

        <div class="dash-card">
          <h3>Threat Level</h3>
          <p class="dash-number danger">ALTO</p>
        </div>

        <div class="dash-card">
          <h3>Eventi Monitorati</h3>
          <p class="dash-number">4.291</p>
        </div>

        <div class="dash-card">
          <h3>Ultimo Incidente</h3>
          <p class="dash-number">23 min fa</p>
        </div>

      </div>

    </section>

    <div id="sidebar"></div>
  </main>

  <div id="footer"></div>

  <script src="/js/ui.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/meteo.js"></script>
  <script src="/js/oroscopo.js"></script>

</body>
</html>
