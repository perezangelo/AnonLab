<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard — AnonLab</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <div id="header"></div>
  <div id="ticker"></div>

  <main class="page">

  <section class="soc-grid">

    <!-- Threat Level -->
    <div class="soc-card threat-card">
      <h2>Threat Level</h2>
      <div id="threat-level" class="threat-level">Loading...</div>
    </div>

    <!-- Attacchi rilevati -->
    <div class="soc-card">
      <h2>Attacchi rilevati (ultime 24h)</h2>
      <canvas id="attacksChart"></canvas>
    </div>

    <!-- Log eventi -->
    <div class="soc-card log-card">
      <h2>Event Log</h2>
      <div id="event-log" class="event-log"></div>
    </div>

    <!-- Indicatori di sistema -->
    <div class="soc-card">
      <h2>System Status</h2>
      <ul class="system-status">
        <li>CPU Load: <span id="cpu-load">--%</span></li>
        <li>Network Activity: <span id="net-activity">-- kb/s</span></li>
        <li>Firewall Status: <span id="fw-status">--</span></li>
      </ul>
    </div>

  </section>

</main>

  <div id="footer"></div>

  <script src="/js/ui.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/meteo.js"></script>
  <script src="/js/oroscopo.js"></script>

</body>
</html>
