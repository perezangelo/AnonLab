<body>

<header class="header">
    <div class="logo">ANON<span>LAB</span></div>
    <nav>

</header>

<main class="page">

    <h1 class="page-title">🛡️ SOC Dashboard</h1>
    <div class="terminal terminal-live"></div>
    <section class="terminal">
        <p>> system scan...</p>
        <p>> threats detected: <span class="green">0</span></p>
        <p>> uptime: <span class="green">99.97%</span></p>
        <p>> log feed: <span class="green">OK</span></p>
    </section>
    <div class="cards-grid">
    <div class="card">
        <h3>Minacce</h3>
        <p><span id="soc-threats">0</span> rilevate</p>
    </div>
    <div class="card">
        <h3>Traffico</h3>
        <p><span id="soc-traffic">70%</span> utilizzo</p>
    </div>
    <div class="card">
        <h3>Log/min</h3>
        <p><span id="soc-logs">120</span></p>
    </div>
</div>
</main>
<footer>
    <p>© 2026 AnonLab — Cyber Intelligence Network</p>
</footer>
    <script>
function typeWriter(element, text, speed = 40) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

document.addEventListener("DOMContentLoaded", () => {
    const terminal = document.querySelector(".terminal-live");
    if (terminal) {
        const text = "> initializing anonlab terminal...\n"
                   + "> loading modules...\n"
                   + "> system online.\n";
        typeWriter(terminal, text, 35);
    }
});
</script>
    <script>
function randomValue(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

setInterval(() => {
    const t = document.querySelector("#soc-threats");
    const tr = document.querySelector("#soc-traffic");
    const l = document.querySelector("#soc-logs");
    if (!t || !tr || !l) return;

    t.textContent = randomValue(0, 3);
    tr.textContent = randomValue(40, 90) + "%";
    l.textContent = randomValue(100, 500);
}, 3000);
</script>
</body>
