<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SOC Dashboard — AnonLab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO BASE -->
  <meta name="description" content="SOC Dashboard di AnonLab: Threat Level, Attacchi rilevati, Event Log, System Status e monitoraggio cyber in tempo reale.">
  <meta name="keywords" content="SOC dashboard, cybersecurity, threat level, attacchi informatici, event log, system status, cyber monitoring">
  <meta name="author" content="AnonLab">

  <!-- CANONICAL -->
  <link rel="canonical" href="https://anonlab.it/dashboard.html">

  <!-- INDEXING -->
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <meta name="bingbot" content="index, follow">

  <!-- OPEN GRAPH -->
  <meta property="og:title" content="SOC Dashboard — AnonLab">
  <meta property="og:description" content="Threat Level, Attacchi rilevati, Event Log e System Status in tempo reale.">
  <meta property="og:image" content="https://anonlab.it/img/eyes.png">
  <meta property="og:url" content="https://anonlab.it/dashboard.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="AnonLab">

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SOC Dashboard — AnonLab">
  <meta name="twitter:description" content="Threat Level, Attacchi rilevati, Event Log e System Status in tempo reale.">
  <meta name="twitter:image" content="https://anonlab.it/img/eyes.png">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- TICKER -->
  <div id="ticker"></div>

  <!-- CONTENUTO PRINCIPALE -->
  <main class="page">

    <section class="soc-grid">

      <!-- H1 PRINCIPALE DELLA PAGINA -->
      <h1 class="page-title">SOC Dashboard</h1>

      <!-- THREAT LEVEL -->
      <div class="soc-card threat-card">
        <h2>Threat Level</h2>
        <div id="threat-level" class="threat-level dash-number">--</div>
      </div>

      <!-- GRAFICO ATTACCHI -->
      <div class="soc-card">
        <h2>Attacchi rilevati (ultime 24h)</h2>
        <canvas id="attacksChart"></canvas>
      </div>

      <!-- EVENT LOG -->
      <div class="soc-card log-card">
        <h2>Event Log</h2>
        <div id="event-log" class="event-log"></div>
      </div>

      <!-- SYSTEM STATUS -->
      <div class="soc-card">
        <h2>System Status</h2>
        <ul class="system-status">
          <li>CPU Load: <span id="cpu-load" class="dash-number">--%</span></li>
          <li>Network Activity: <span id="net-activity" class="dash-number">-- kb/s</span></li>
          <li>Firewall Status: <span id="fw-status" class="dash-number">--</span></li>
        </ul>
      </div>

    </section>

  </main>

  <!-- SIDEBAR -->
  <div id="sidebar"></div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- SCRIPT GLOBALI -->
  <script src="/js/ui.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/meteo.js"></script>
  <script src="/js/oroscopo.js"></script>

  <!-- CHART.JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- DASHBOARD JS COMPLETO -->
  <script src="/js/dashboard.js"></script>

</body>
</html>
