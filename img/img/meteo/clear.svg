<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00eaff" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Sole (Hybrid: cerchio pieno + raggi outline) -->
  <circle cx="50" cy="50" r="18" fill="#00eaff33" stroke="#00eaff" stroke-width="3" filter="url(#neon)"/>

  <!-- Raggi -->
  <g stroke="#00eaff" stroke-width="3" stroke-linecap="round" filter="url(#neon)">
    <line x1="50" y1="10" x2="50" y2="25"/>
    <line x1="50" y1="75" x2="50" y2="90"/>
    <line x1="10" y1="50" x2="25" y2="50"/>
    <line x1="75" y1="50" x2="90" y2="50"/>
    <line x1="22" y1="22" x2="32" y2="32"/>
    <line x1="68" y1="68" x2="78" y2="78"/>
    <line x1="22" y1="78" x2="32" y2="68"/>
    <line x1="68" y1="32" x2="78" y2="22"/>
  </g>
</svg>
