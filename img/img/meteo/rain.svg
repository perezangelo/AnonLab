<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00eaff" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Nuvola -->
  <path d="M30 50
           C20 50, 15 42, 20 35
           C22 28, 30 25, 40 27
           C45 18, 60 18, 65 27
           C75 27, 82 35, 80 45
           C78 52, 70 55, 60 55
           L35 55
           C32 55, 30 53, 30 50Z"
        fill="#00eaff22"
        stroke="#00eaff"
        stroke-width="3"
        filter="url(#neon)"/>

  <!-- Gocce -->
  <g stroke="#00eaff" stroke-width="3" stroke-linecap="round" filter="url(#neon)">
    <line x1="40" y1="60" x2="40" y2="75"/>
    <line x1="55" y1="60" x2="55" y2="75"/>
    <line x1="70" y1="60" x2="70" y2="75"/>
  </g>
</svg>
