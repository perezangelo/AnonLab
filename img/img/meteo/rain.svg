<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<path d="M35 60h70a20 20 0 0 0 0-40 30 30 0 0 0-58-8A25 25 0 0 0 35 60z"
      stroke="#00eaff" stroke-width="3" fill="none" filter="url(#glow)"/>

<g stroke="#00eaff" stroke-width="3" filter="url(#glow)">
  <line x1="55" y1="80" x2="50" y2="100">
    <animate attributeName="y1" values="80;100;80" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="100;120;100" dur="0.9s" repeatCount="indefinite"/>
  </line>
  <line x1="75" y1="80" x2="70" y2="100">
    <animate attributeName="y1" values="80;100;80" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="100;120;100" dur="1.1s" repeatCount="indefinite"/>
  </line>
  <line x1="95" y1="80" x2="90" y2="100">
    <animate attributeName="y1" values="80;100;80" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="100;120;100" dur="1s" repeatCount="indefinite"/>
  </line>
</g>
</svg>
