<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00eaff" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Icona generica: cerchio HUD + punto centrale -->
  <circle cx="50" cy="50" r="28"
          fill="#00eaff11"
          stroke="#00eaff"
          stroke-width="3"
          filter="url(#neon)"/>

  <circle cx="50" cy="50" r="6"
          fill="#00eaff55"
          stroke="#00eaff"
          stroke-width="2"
          filter="url(#neon)"/>
</svg>
