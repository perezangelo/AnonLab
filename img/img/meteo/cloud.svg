<svg width="140" height="100" viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<path id="cloud" d="M35 70h70a20 20 0 0 0 0-40 30 30 0 0 0-58-8A25 25 0 0 0 35 70z"
      stroke="#00eaff" stroke-width="3" fill="none" filter="url(#glow)">
  <animateTransform attributeName="transform"
                    type="translate"
                    values="-2 0; 2 0; -2 0"
                    dur="4s"
                    repeatCount="indefinite"/>
</path>
</svg>
