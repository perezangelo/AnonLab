<svg width="120" height="120" viewBox="0 0 100 100" fill="none"
     xmlns="http://www.w3.org/2000/svg"
     stroke="#00eaff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Curva principale Capricorno -->
    <path d="M30 30 C20 40, 20 60, 35 65 C50 70, 55 55, 55 45 C55 35, 45 30, 40 35" />

    <!-- Ricciolo finale -->
    <path d="M55 45 C70 40, 75 55, 65 65 C55 75, 45 70, 50 60" />
  </g>

</svg>
