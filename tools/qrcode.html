<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>

<body>

<div class="tool-content">
    <h2>QR Code Generator</h2>
    <p>Inserisci un testo per generare un QR Code.</p>

    <input id="qr-input" type="text" placeholder="testo" class="tool-input">
    <button onclick="runQR()" class="tool-button">Genera</button>

    <pre id="qr-output" class="tool-output"></pre>
</div>

<script>
function runQR() {
    const text = document.getElementById("qr-input").value;
    document.getElementById("qr-output").innerText =
        "QR generator non implementato lato server.\nTesto: " + text;
}
</script>

</body>
</html>
