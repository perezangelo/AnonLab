<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Lookup</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>

<body>

<div class="tool-content">
    <h2>DNS Lookup</h2>
    <p>Inserisci un dominio per risolvere i record DNS.</p>

    <input id="dns-input" type="text" placeholder="esempio: google.com" class="tool-input">
    <button onclick="runDNS()" class="tool-button">Cerca</button>

    <pre id="dns-output" class="tool-output"></pre>
</div>

<script>
function runDNS() {
    const domain = document.getElementById("dns-input").value;
    document.getElementById("dns-output").innerText =
        "DNS lookup non implementato lato server.\nDominio richiesto: " + domain;
}
</script>

</body>
</html>
