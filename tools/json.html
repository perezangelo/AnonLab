<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter | AnonLab Tools</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/ui.js" defer></script>
</head>

<body>

<div id="header"></div>

<main class="page">
    <section class="main-column">

        <div class="widget-large tools-box">
            <div class="box-title-row">
                <img src="../img/icons/json.png" class="box-title-icon">
                <h2>JSON Formatter</h2>
            </div>

            <div class="tool-content">
                <textarea id="json-input" class="tool-input" placeholder="Incolla JSON qui"></textarea>

                <button onclick="formatJSON()" class="tool-button">Formatta</button>

                <pre id="json-output" class="tool-output"></pre>
            </div>
        </div>

    </section>

    <aside id="sidebar"></aside>
</main>

<div id="footer"></div>

<script>
document.getElementById("header").innerHTML =
  '<object type="text/html" data="../partials/header.html"></object>';
document.getElementById("sidebar").innerHTML =
  '<object type="text/html" data="../partials/sidebar.html"></object>';
document.getElementById("footer").innerHTML =
  '<object type="text/html" data="../partials/footer.html"></object>';

function formatJSON() {
    try {
        const obj = JSON.parse(document.getElementById("json-input").value);
        document.getElementById("json-output").innerText = JSON.stringify(obj, null, 4);
    } catch {
        document.getElementById("json-output").innerText = "JSON non valido.";
    }
}
</script>

</body>
</html>
