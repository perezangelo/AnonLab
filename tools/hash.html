<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>

<body>

<div class="tool-content">
    <h2>Hash Generator</h2>
    <p>Inserisci un testo per generare hash (placeholder).</p>

    <input id="hash-input" type="text" placeholder="testo" class="tool-input">
    <button onclick="genHash()" class="tool-button">Genera</button>

    <pre id="hash-output" class="tool-output"></pre>
</div>

<script>
function genHash() {
    const text = document.getElementById("hash-input").value;
    document.getElementById("hash-output").innerText =
        "Hash non implementato lato server.\nTesto: " + text;
}
</script>

</body>
</html>
