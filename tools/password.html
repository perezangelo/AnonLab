<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | AnonLab Tools</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
    <script src="../js/ui.js" defer></script>
</head>

<body>

<div id="header"></div>

<main class="page">
    <section class="main-column">

        <div class="widget-large tools-box">
            <div class="box-title-row">
                <img src="../img/icons/password.png" class="box-title-icon">
                <h2>Password Generator</h2>
            </div>

            <div class="tool-content">
                <p>Genera una password sicura.</p>

                <button onclick="genPass()" class="tool-button">Genera</button>

                <pre id="pass-output" class="tool-output"></pre>
            </div>
        </div>

    </section>

    <aside id="sidebar"></aside>
</main>

<div id="footer"></div>

<script>
document.getElementById("header").innerHTML =
  '<object type="text/html" data="../partials/header.html"></object>';
document.getElementById("sidebar").innerHTML =
  '<object type="text/html" data="../partials/sidebar.html"></object>';
document.getElementById("footer").innerHTML =
  '<object type="text/html" data="../partials/footer.html"></object>';

function genPass() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
    let pass = "";
    for (let i = 0; i < 16; i++) pass += chars[Math.floor(Math.random() * chars.length)];
    document.getElementById("pass-output").innerText = pass;
}
</script>

</body>
</html>
