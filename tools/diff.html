<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Diff</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>

<body>

<div class="tool-content">
    <h2>Text Diff</h2>

    <textarea id="diff-a" class="tool-input" placeholder="Testo A"></textarea>
    <textarea id="diff-b" class="tool-input" placeholder="Testo B"></textarea>

    <button onclick="runDiff()" class="tool-button">Confronta</button>

    <pre id="diff-output" class="tool-output"></pre>
</div>

<script>
function runDiff() {
    const a = document.getElementById("diff-a").value.split("\n");
    const b = document.getElementById("diff-b").value.split("\n");

    let out = "";
    for (let i = 0; i < Math.max(a.length, b.length); i++) {
        if (a[i] !== b[i]) {
            out += `- ${a[i] || ""}\n+ ${b[i] || ""}\n\n`;
        }
    }

    document.getElementById("diff-output").innerText =
        out || "Nessuna differenza.";
}
</script>

</body>
</html>
