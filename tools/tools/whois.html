<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOIS Lookup | AnonLab Tools</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">

    <!-- JS -->
    <script src="../js/ui.js" defer></script>
</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<main class="page">

    <section class="main-column">

        <div class="widget-large tools-box">
            <div class="box-title-row">
                <img src="../img/icons/whois.png" class="box-title-icon">
                <h2>WHOIS Lookup</h2>
            </div>

            <div class="tool-content">
                <p>Inserisci un dominio per ottenere informazioni WHOIS.</p>

                <input id="whois-input" type="text" placeholder="esempio: google.com" class="tool-input">
                <button onclick="runWhois()" class="tool-button">Cerca</button>

                <pre id="whois-output" class="tool-output"></pre>
            </div>
        </div>

    </section>

    <aside id="sidebar"></aside>

</main>

<!-- FOOTER -->
<div id="footer"></div>

<!-- PARTIALS -->
<script>
document.getElementById("header").innerHTML =
  '<object type="text/html" data="../partials/header.html"></object>';

document.getElementById("sidebar").innerHTML =
  '<object type="text/html" data="../partials/sidebar.html"></object>';

document.getElementById("footer").innerHTML =
  '<object type="text/html" data="../partials/footer.html"></object>';

function runWhois() {
    const domain = document.getElementById("whois-input").value;
    document.getElementById("whois-output").innerText =
        "WHOIS lookup non implementato lato server.\nDominio richiesto: " + domain;
}
</script>

</body>
</html>
