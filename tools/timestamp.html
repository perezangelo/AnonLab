<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Converter</title>

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>

<body>

<div class="tool-content">
    <h2>Timestamp Converter</h2>

    <input id="ts-input" type="text" placeholder="Timestamp UNIX" class="tool-input">
    <button onclick="convertTS()" class="tool-button">Converti</button>

    <pre id="ts-output" class="tool-output"></pre>
</div>

<script>
function convertTS() {
    const ts = parseInt(document.getElementById("ts-input").value);
    if (isNaN(ts)) {
        document.getElementById("ts-output").innerText = "Timestamp non valido.";
        return;
    }
    document.getElementById("ts-output").innerText =
        new Date(ts * 1000).toString();
}
</script>

</body>
</html>
