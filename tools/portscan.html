<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Scanner</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>

<body>

<div class="tool-content">
    <h2>Port Scanner</h2>
    <p>Simulazione scansione porte.</p>

    <input id="portscan-input" type="text" placeholder="esempio: 192.168.1.1" class="tool-input">
    <button onclick="runPortscan()" class="tool-button">Scansiona</button>

    <pre id="portscan-output" class="tool-output"></pre>
</div>

<script>
function runPortscan() {
    const ip = document.getElementById("portscan-input").value;
    document.getElementById("portscan-output").innerText =
        "Simulazione scansione porte.\nIP richiesto: " + ip;
}
</script>

</body>
</html>
