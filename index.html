<!-- ⭐ TECH RADAR -->
<section class="widget-large">
  <div class="box-title-row">
    <img src="/img/Cybersecurity.png" class="box-title-icon" alt="Cybersecurity">
    <h2>Tech Radar</h2>
    <a href="https://www.enisa.europa.eu/enisa-nis360-2026" 
       target="_blank" rel="noopener noreferrer" style="color:#ff7b00;">
       ENISA Threat Landscape →
    </a>
  </div>
  <div id="tech-radar"></div>
</section>

<script>
async function loadTechRadar() {
  const radarBox = document.getElementById("tech-radar");
  if (!radarBox) return;

  try {
    const res = await fetch(
      "https://raw.githubusercontent.com/perezangelo/AnonLab/main/datahub/tech-radar.json?ts=" + Date.now()
    );
    const data = await res.json();

    radarBox.innerHTML = "";

    data.slice(0, 20).forEach(item => {
      const div = document.createElement("div");
      div.className = "radar-item";

      div.innerHTML = `
        <h4 style="color:#00eaff;">${item.name}</h4>
        <p style="color:#ccc;">
          Quadrant: ${item.quadrant}<br>
          Ring: ${item.ring}<br>
          Fonte: ${item.source}<br>
          Ultimo aggiornamento: ${item.updated}
        </p>
        <a href="${item.url}" target="_blank" style="color:#ff7b00;">
          Vai alla risorsa →
        </a>
      `;

      radarBox.appendChild(div);
    });

  } catch (err) {
    radarBox.innerHTML = "<p style='color:#ff7b00;'>Impossibile caricare il Tech Radar.</p>";
    console.error("Tech Radar error:", err);
  }
}

loadTechRadar();
setInterval(loadTechRadar, 15000);
</script>

<!-- ⭐ BACK TO TOP -->
<button id="backToTop">↑</button>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const backToTop = document.getElementById("backToTop");
  if (!backToTop) return;

  window.addEventListener("scroll", () => {
    backToTop.style.display = window.scrollY > 400 ? "block" : "none";
  });

  backToTop.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
});
</script>
