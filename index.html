<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnonLab</title>

  <!-- Stili principali -->
  <style>
    :root{
      --bg:#ffffff;
      --text:#000000;
      --accent:#111111;
      --max-width:1100px;
      --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      font-family:var(--font-sans);
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .site{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 20px;
      box-sizing:border-box;
    }

    .container{
      width:100%;
      max-width:var(--max-width);
      margin:0 auto;
    }

    header.site-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:36px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
      color:var(--accent);
    }

    .brand .logo{
      width:48px;
      height:48px;
      background:#000;
      border-radius:8px;
      display:inline-block;
    }

    .brand h1{
      font-size:18px;
      margin:0;
      font-weight:700;
      letter-spacing:0.2px;
    }

    main.hero{
      display:flex;
      align-items:flex-start;
      gap:28px;
      flex-wrap:wrap;
    }

    .hero-left{
      flex:1 1 480px;
      min-width:260px;
    }

    .subtitle{
      margin:0 0 18px 0;
      font-size:28px;        /* dimensione del carattere richiesta */
      line-height:1.25;
      color: #000000;        /* colore nero */
      font-weight:600;
    }

    /* Forza l'andata a capo dove inserisci <br> nel markup */
    .lead{
      margin:0 0 24px 0;
      color:#333;
      font-size:16px;
      line-height:1.6;
    }

    .cta{
      display:inline-block;
      padding:10px 18px;
      background:#000;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      font-weight:600;
    }

    /* Immagine o area di destra */
    .hero-right{
      flex:0 0 360px;
      min-width:260px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .mock{
      width:100%;
      height:220px;
      background:#f3f3f3;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#999;
      font-size:14px;
    }

    /* Responsive */
    @media (max-width:720px){
      .subtitle{ font-size:22px; }
      .hero{ flex-direction:column; }
      .hero-right{ order: -1; width:100%; }
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="container">
      <header class="site-header">
        <a class="brand" href="/">
          <span class="logo" aria-hidden="true"></span>
          <h1>AnonLab</h1>
        </a>
        <nav aria-label="main">
          <a href="#" style="text-decoration:none;color:var(--accent);font-weight:600">Contatti</a>
        </nav>
      </header>

      <main class="hero" role="main">
        <div class="hero-left">
          <!-- Qui il testo con ANDATA A CAPO esatta -->
          <p class="subtitle">
            strumenti moderni<br>per la tua presenza online.
          </p>

          <p class="lead">
            Soluzioni su misura per brand, freelance e piccole imprese: siti veloci, design pulito, SEO e strategie digitali.
          </p>

          <a class="cta" href="#">Scopri di più</a>
        </div>

        <div class="hero-right">
          <div class="mock">Immagine / Anteprima</div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
