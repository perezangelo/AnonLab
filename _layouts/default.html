<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- Favicon PNG principale -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Varianti PNG (opzionali ma utili) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">

    <!-- SVG per browser moderni -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- ICO per compatibilità totale -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

    <!-- Apple iOS -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <!-- Manifest PWA -->
    <link rel="manifest" href="/site.webmanifest">
</head>

<body>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    <!-- WIDGETS: feed → meteo → oroscopo -->
    <section class="widgets-row">
        {% include widgets.html %}
    </section>

    <footer>
        {% include footer.html %}
    </footer>
    
<script>
document.addEventListener("DOMContentLoaded", function() {

    // FEED CYBERCRIME
    fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.cert-agid.gov.it/feed/")
      .then(r => r.json())
      .then(data => {
        const items = data.items.slice(0, 5)
          .map(i => `<p><a href="${i.link}" target="_blank">${i.title}</a></p>`)
          .join("");

        document.getElementById("cyber").innerHTML = `
          <h3>Cyber Security</h3>
          ${items}
        `;
      });

    // METEO
    fetch("https://api.open-meteo.com/v1/forecast?latitude=45.82&longitude=8.83&current_weather=true")
      .then(r => r.json())
      .then(data => {
        const t = data.current_weather.temperature;
        const w = data.current_weather.windspeed;

        document.getElementById("meteo").innerHTML = `
          <h3>Meteo</h3>
          <p>Temperatura: ${t}°C</p>
          <p>Vento: ${w} km/h</p>
        `;
      });

    // OROSCOPO
    fetch("https://aztro.sameerkumar.website/?sign=aries&day=today", { method: "POST" })
      .then(r => r.json())
      .then(data => {
        document.getElementById("oroscopo").innerHTML = `
          <h3>Oroscopo</h3>
          <p>${data.description}</p>
        `;
      });

});
</script>
</body>
</html>
