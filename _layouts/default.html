<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ page.title }}</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- CSS PRINCIPALE -->
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    <!-- WIDGETS -->
    <section class="widgets-row">
        {% include widgets.html %}
    </section>

    {% include footer.html %}

    <!-- SCRIPT WIDGETS FUNZIONANTI -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {

        // CYBER NEWS (funzionante)
        fetch("https://hnrss.org/security.json")
          .then(r => r.json())
          .then(data => {
            const items = data.items.slice(0, 5)
              .map(i => `<p><a href="${i.url}" target="_blank">${i.title}</a></p>`)
              .join("");

            document.getElementById("cyber").innerHTML = `
              <h3>Cyber News</h3>
              ${items}
            `;
          });

        // METEO (funzionante)
        fetch("https://api.open-meteo.com/v1/forecast?latitude=45.82&longitude=8.83&current_weather=true")
          .then(r => r.json())
          .then(data => {
            const t = data.current_weather.temperature;
            const w = data.current_weather.windspeed;

            document.getElementById("meteo").innerHTML = `
              <h3>Meteo</h3>
              <p>Temperatura: ${t}°C</p>
              <p>Vento: ${w} km/h</p>
            `;
          });

        // OROSCOPO (funzionante)
        fetch("https://horoscope-app-api.vercel.app/api/v1/get-horoscope/daily?sign=aries&day=today")
          .then(r => r.json())
          .then(data => {
            document.getElementById("oroscopo").innerHTML = `
              <h3>Oroscopo</h3>
              <p>${data.data.horoscope_data}</p>
            `;
          });

    });
    </script>

</body>
</html>
