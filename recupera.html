<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Recupero Credenziali</title>
<link rel="stylesheet" href="/css/style.css">

<style>
  body {
    background: #000;
    color: #0f0;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .recover-box {
    text-align: center;
    padding: 40px;
    border: 1px solid #0f0;
    background: #050505;
    box-shadow: 0 0 15px #0f0;
    max-width: 420px;
  }

  .recover-box h2 {
    margin-bottom: 15px;
    color: #0f0;
  }

  .recover-box p {
    color: #8f8;
    font-size: 15px;
    margin-bottom: 20px;
  }

  .recover-box input {
    width: 90%;
    padding: 10px;
    margin-bottom: 15px;
    background: #000;
    border: 1px solid #0f0;
    color: #0f0;
    font-family: monospace;
  }

  .recover-box button {
    padding: 10px 20px;
    background: #0f0;
    color: #000;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  .recover-box button:hover {
    background: #8f8;
  }
</style>
</head>

<body>

<div class="recover-box">
  <h2>Recupero Credenziali</h2>
  <p>Inserisci <b>username</b> o <b>email</b> per ricevere le tue credenziali.</p>

  <form action="https://angelonline.altervista.org/backend/recover.php" method="POST" onsubmit="mostraMessaggio()">
      <input type="text" name="input" placeholder="Username o Email" required>
      <button type="submit">Recupera</button>
  </form>

  <p id="msg" style="display:none; margin-top:20px; color:#0f0;">
    Operazione completata. Verrai reindirizzato alla home...
  </p>
</div>

<script>
function mostraMessaggio() {
  document.getElementById("msg").style.display = "block";
  setTimeout(() => {
    window.location.href = "/";
  }, 3000);
}
</script>
 <script>
fetch("https://angelonline.altervista.org/counter/visit_counter.php", {
    method: "GET",
    mode: "cors"
});
</script>

</body>
</html>
