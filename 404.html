<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>404 — Pagina non trovata</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .error-container {
      text-align: center;
      padding: 80px 20px;
    }
    .error-code {
      font-size: 5rem;
      font-family: var(--font-mono);
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,255,157,0.4);
    }
    .error-message {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .error-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1rem;
      border: 1px solid var(--accent);
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.2s;
    }
    .error-link a:hover {
      background: var(--accent-soft);
    }
  </style>
</head>
<body>

  <div id="header"></div>

  <main class="page">
    <section class="main-column">
      <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">La pagina che cerchi non esiste.</div>
        <div class="error-link">
          <a href="/index.html">Torna alla Home</a>
        </div>
      </div>
    </section>

    <div id="sidebar"></div>
  </main>

  <div id="footer"></div>

  <script src="/js/ui.js"></script>
  <script src="/js/feed.js"></script>
  <script src="/js/meteo.js"></script>
  <script src="/js/oroscopo.js"></script>

</body>
</html>
