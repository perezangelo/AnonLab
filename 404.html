<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>404 – Page Not Found</title>
  <style>
    body {
      background: #000;
      color: #00ff9d;
      font-family: Consolas, monospace;
      text-align: center;
      padding-top: 100px;
    }
    .glitch {
      font-size: 40px;
      text-shadow: 0 0 8px #00ff9d;
      animation: glitch 1.5s infinite;
    }
    @keyframes glitch {
      0% { opacity: 1; }
      20% { opacity: 0.6; transform: translateX(-2px); }
      40% { opacity: 1; transform: translateX(2px); }
      60% { opacity: 0.7; transform: translateX(-1px); }
      80% { opacity: 1; }
      100% { opacity: 0.9; }
    }
    a {
      color: #00ff9d;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="glitch">404 – Resource Not Found</div>
<p>Il file che stai cercando non esiste o è stato spostato.</p>
<p><a href="/">Torna alla Home</a></p>

</body>
</html>
