<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Login - AnonLab</title>
<style>
body {
  background:#050510;
  color:#0ff;
  font-family:Consolas, monospace;
  padding:20px;
}
.box {
  max-width:400px;
  margin:auto;
  padding:20px;
  border:1px solid #0ff4;
  border-radius:8px;
  background:#0a0a20;
  box-shadow:0 0 15px #0ff3;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#02020a;
  border:1px solid #0ff4;
  color:#0ff;
  border-radius:4px;
}
button {
  width:100%;
  padding:10px;
  background:#0ff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}
button:hover { opacity:0.8; }
</style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <form action="https://angelonline.altervista.org/backend/login.php" method="POST">
      <input type="text" name="username" placeholder="Username o Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Accedi</button>
  </form>

  <p style="margin-top:10px; font-size:12px;">
    Se è la prima volta che accedi, ti verrà chiesto di cambiare la password.
  </p>
</div>
 <script>
fetch("https://angelonline.altervista.org/counter/visit_counter.php", {
    method: "GET",
    mode: "cors"
});
</script>

</body>
</html>
