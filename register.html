<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Registrazione - AnonLab</title>
<style>
body {
  background:#050510;
  color:#0ff;
  font-family:Consolas, monospace;
  padding:20px;
}
.box {
  max-width:400px;
  margin:auto;
  padding:20px;
  border:1px solid #0ff4;
  border-radius:8px;
  background:#0a0a20;
  box-shadow:0 0 15px #0ff3;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#02020a;
  border:1px solid #0ff4;
  color:#0ff;
  border-radius:4px;
}
button {
  width:100%;
  padding:10px;
  background:#0ff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}
button:hover { opacity:0.8; }
</style>
</head>
<body>

<div class="box">
  <h2>Registrazione</h2>
  <p>Riceverai una password temporanea via email.</p>

  <form action="https://angelonline.altervista.org/backend/register.php" method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email" required>
    <p id="userCheck" style="font-size:12px; color:#f55; display:none;"></p>
<p id="emailCheck" style="font-size:12px; color:#f55; display:none;"></p>
<script>
const userField = document.querySelector("input[name='username']");
const emailField = document.querySelector("input[name='email']");
const userCheck = document.getElementById("userCheck");
const emailCheck = document.getElementById("emailCheck");

userField.addEventListener("input", () => {
    fetch("https://angelonline.altervista.org/backend/check_user.php?username=" + userField.value)
    .then(r => r.text())
    .then(res => {
        if (res === "exists") {
            userCheck.style.display = "block";
            userCheck.innerHTML = "⚠️ Username già in uso";
        } else {
            userCheck.style.display = "none";
        }
    });
});

emailField.addEventListener("input", () => {
    fetch("https://angelonline.altervista.org/backend/check_user.php?email=" + emailField.value)
    .then(r => r.text())
    .then(res => {
        if (res === "exists") {
            emailCheck.style.display = "block";
            emailCheck.innerHTML = "⚠️ Email già registrata";
        } else {
            emailCheck.style.display = "none";
        }
    });
});
</script>
      <button type="submit">Registrati</button>
  </form>
</div>
  <div id="confirmBox" style="
    display:none;
    margin-top:15px;
    padding:15px;
    border:1px solid #0ff4;
    background:#0a0a20;
    color:#0ff;
    border-radius:6px;
    box-shadow:0 0 12px #0ff6;
    text-align:center;
    font-size:14px;
">
    Registrazione completata! Controlla la tua email per la password temporanea.
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = this;
    const box = document.getElementById("confirmBox");

    fetch(form.action, {
        method: "POST",
        body: new FormData(form)
    })
    .then(r => r.text())
    .then(res => {
        box.style.display = "block";
        box.innerHTML = res.includes("Registrazione completata")
            ? "Registrazione completata! Controlla la tua email."
            : res;
    });
});
</script>
<script>
fetch("https://angelonline.altervista.org/counter/visit_counter.php", {
    method: "GET",
    mode: "cors"
});
</script>

</body>
</html>

</body>
</html>
