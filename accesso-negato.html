<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Accesso Negato</title>

<style>
body {
    background:#000814;
    color:#00eaff;
    font-family:"Courier New", monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box {
    text-align:center;
    padding:40px;
    border:1px solid #00eaff;
    background:#00111f;
    box-shadow:0 0 20px #00eaff55;
    border-radius:8px;
    max-width:420px;
}

h2 {
    color:#00eaff;
    text-shadow:0 0 12px #00eaff;
}

p {
    color:#c8f7ff;
    font-size:16px;
}
</style>
</head>

<body>
<div class="box">
    <h2>Accesso Negato</h2>
    <p>Non sei autorizzato ad accedere a questa area.</p>
</div>
</body>
</html>
