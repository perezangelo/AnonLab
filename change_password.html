<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Cambia Password - AnonLab</title>
<style>
body {
  background:#050510;
  color:#0ff;
  font-family:Consolas, monospace;
  padding:20px;
}
.box {
  max-width:450px;
  margin:auto;
  padding:20px;
  border:1px solid #0ff4;
  border-radius:8px;
  background:#0a0a20;
  box-shadow:0 0 20px #0ff3;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#02020a;
  border:1px solid #0ff4;
  color:#0ff;
  border-radius:4px;
}
button {
  width:100%;
  padding:10px;
  background:#0ff;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}
button:hover { opacity:0.8; }
ul {
  font-size:12px;
  color:#0fa;
}
</style>
</head>
<body>

<div class="box">
  <h2>Cambia Password</h2>

  <p>La nuova password deve rispettare questi requisiti:</p>
  <ul>
    <li>Minimo 12 caratteri</li>
    <li>Almeno una MAIUSCOLA</li>
    <li>Almeno una minuscola</li>
    <li>Almeno un numero</li>
    <li>Almeno un simbolo</li>
  </ul>

  <form method="POST">
      <input type="password" name="new_password" placeholder="Nuova password" required>
      <input type="password" name="confirm_password" placeholder="Conferma password" required>
      <button type="submit">Aggiorna Password</button>
  </form>
</div>

</body>
</html>
