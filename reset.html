<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Reimposta Password</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="sidebar-box" aria-label="Reset password">
  <img src="/img/support.png" class="sidebar-icon" alt="Icona reset password">
  <h3>Reimposta Password</h3>

  <form id="reset-password-form">

    <input type="password" id="new-password" placeholder="Nuova password" required>
    <input type="password" id="confirm-password" placeholder="Conferma password" required>

    <button type="submit">Aggiorna Password</button>
  </form>

  <p id="reset-status"></p>
</div>

<script src="/js/reset.js"></script>

</body>
</html>
