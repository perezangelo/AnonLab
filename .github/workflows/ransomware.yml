name: Update Ransomware Data

on:
  schedule:
    - cron: "0 */6 * * *"   # ogni 6 ore
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Scarica dati ransomware
        run: |
          curl -s https://ransomwatch-api.vercel.app/groups > groups.json

      - name: Converti nel formato anonlab
        run: |
          cat groups.json | jq '[.[] | {
            group: .name,
            description: .description,
            status: .status,
            date: .date_added,
            leak: .leak_site,
            icon: .icon
          }]' > datahub/ransomware.json

      - name: Commit & Push
        run: |
          git config user.name "anonlab-bot"
          git config user.email "bot@anonlab.it"
          git add datahub/ransomware.json
          git commit -m "Auto-update ransomware data"
          git push
