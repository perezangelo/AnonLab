name: Recover Password

on:
  repository_dispatch:
    types: [recover_password]

jobs:
  recover-password:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup jq
        run: sudo apt-get install jq -y

      - name: Cerca utente e genera token reset
        id: search
        run: |
          EMAIL="${{ github.event.client_payload.email }}"
          FILE="data/users.json"

          # Controlla se l'email esiste
          if jq -e ".[] | select(.email == \"$EMAIL\")" "$FILE" > /dev/null; then
            # Genera token reset
            TOKEN=$(openssl rand -hex 16)
            EXPIRE=$(date -d "+1 hour" +"%s")

            TMP=$(mktemp)
            jq "map(if .email == \"$EMAIL\" then .reset_token = \"$TOKEN\" | .reset_expire = \"$EXPIRE\" else . end)" "$FILE" > "$TMP"
            mv "$TMP" "$FILE"

            echo "found=true" >> $GITHUB_OUTPUT
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.search.outputs.found == 'true'
        env:
          TOKEN: ${{ secrets.USER_DB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/users.json
          git commit -m "Generato token reset password per ${{ github.event.client_payload.email }}" || echo "Nessuna modifica"
          git push https://x-access-token:${TOKEN}@github.com/perezangelo/AnonLab.git main

      - name: Invia email con Web3Forms
        run: |
          EMAIL="${{ github.event.client_payload.email }}"
          FOUND="${{ steps.search.outputs.found }}"
          TOKEN="${{ steps.search.outputs.token }}"

          if [ "$FOUND" = "true" ]; then
            MESSAGE="Per reimpostare la tua password, visita il seguente link:\nhttps://anonlab.it/reset.html?token=$TOKEN"
          else
            MESSAGE="L'email inserita non risulta registrata su AnonLab."
          fi

          curl -X POST https://api.web3forms.com/submit \
            -H "Content-Type: application/json" \
            -d "{
              \"access_key\": \"9d55bc37-731e-405c-b3c2-b24c3feffb8c\",
              \"from_name\": \"AnonLab\",
              \"subject\": \"Recupero Password\",
              \"email\": \"$EMAIL\",
              \"message\": \"$MESSAGE\"
            }"
