name: Register User

on:
  repository_dispatch:
    types: [register_user]

jobs:
  update-users:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup jq
        run: sudo apt-get install jq -y

      - name: Aggiorna users.json
        run: |
          echo "📌 Aggiornamento database utenti..."

          USERNAME="${{ github.event.client_payload.username }}"
          EMAIL="${{ github.event.client_payload.email }}"
          HASH="${{ github.event.client_payload.password_hash }}"

          FILE="data/users.json"

          # Se il file non esiste, crealo
          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi

          # Controlla se l'utente esiste già
          if jq -e ".[] | select(.email == \"$EMAIL\")" "$FILE" > /dev/null; then
            echo "⚠️ Utente già registrato: $EMAIL"
            exit 0
          fi

          # Aggiungi nuovo utente
          TMP=$(mktemp)
          jq ". += [{\"email\":\"$EMAIL\",\"username\":\"$USERNAME\",\"password_hash\":\"$HASH\",\"reset_token\":null,\"reset_expire\":null}]" "$FILE" > "$TMP"
          mv "$TMP" "$FILE"

      - name: Commit & Push
        env:
          TOKEN: ${{ secrets.USER_DB_TOKEN }}
        run: |
          echo "📌 Commit delle modifiche..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/users.json
          git commit -m "Nuovo utente registrato: $USERNAME" || echo "Nessuna modifica da commitare"

          git push https://x-access-token:${TOKEN}@github.com/perezangelo/AnonLab.git main
