name: Update Cyber News (AnonLab Ultimate)

on:
  schedule:
    - cron: "*/10 * * * *"   # ogni 10 minuti
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Fetch and merge cyber news
        run: |
          python3 << 'EOF'
        import feedparser, requests, json, time
from bs4 import BeautifulSoup
from email.utils import parsedate_to_datetime

FEEDS = [
    "https://www.cisa.gov/cybersecurity-advisories/all.xml",
    "https://feeds.feedburner.com/TheHackersNews",
    "https://www.bleepingcomputer.com/feed/",
    "https://www.darkreading.com/rss.xml",
    "https://feeds.feedburner.com/securityweek",
    "https://cybernews.com/feed/",
    "https://www.ansa.it/sito/notizie/tecnologia/tecnologia_rss.xml"
]

headers = {
    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"
}

all_news = []

def extract_image(url):
    try:
        html = requests.get(url, headers=headers, timeout=8).text
        soup = BeautifulSoup(html, "html.parser")
        og = soup.find("meta", property="og:image")
        if og and og.get("content"):
            return og["content"]
    except:
        pass
    return ""

def parse_date(entry):
    # 1) feedparser standard
    if "published" in entry:
        try:
            return parsedate_to_datetime(entry["published"]).timestamp()
        except:
            pass

    # 2) updated
    if "updated" in entry:
        try:
            return parsedate_to_datetime(entry["updated"]).timestamp()
        except:
            pass

    # 3) fallback: adesso
    return time.time()

for url in FEEDS:
    try:
        print(f"Fetching {url}")
        r = requests.get(url, headers=headers, timeout=10)
        r.raise_for_status()

        feed = feedparser.parse(r.text)

        for entry in feed.entries[:10]:
            title = entry.get("title", "").strip()
            link = entry.get("link", "").strip()

            if title and link:
                img = extract_image(link)
                ts = parse_date(entry)

                all_news.append({
                    "title": title,
                    "link": link,
                    "image": img,
                    "ts": ts
                })

    except Exception as e:
        print(f"Errore feed {url}: {e}")

# Rimuovi duplicati
unique = []
seen = set()

for n in all_news:
    if n["title"] not in seen:
        unique.append(n)
        seen.add(n["title"])

# Ordina per timestamp
unique.sort(key=lambda x: x["ts"], reverse=True)

# Limita a 30 news
final_news = unique[:30]

# Rimuovi ts per compatibilità ticker
for n in final_news:
    n.pop("ts", None)

with open("data/news.json", "w") as f:
    json.dump(final_news, f, indent=2)

print(f"Totale news salvate: {len(final_news)}")
          EOF

      - name: Commit updated news.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/news.json
          git commit -m "Update cyber news" || echo "No changes"
          git push

