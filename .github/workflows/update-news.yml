name: Update CISA News

on:
  schedule:
    - cron: "*/10 * * * *"   # ogni 10 minuti
  workflow_dispatch:         # avvio manuale

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y jq curl

      - name: Fetch CISA RSS
        run: |
          curl -s "https://www.cisa.gov/cybersecurity-advisories/all.xml" -o cisa.xml

      - name: Convert RSS → JSON
        run: |
          # Estrae titolo e link delle prime 8 news
          cat cisa.xml | \
          grep -E "<title>|<link>" | \
          sed 's/<\/\?title>//g; s/<\/\?link>//g' | \
          sed 's/^[ \t]*//' | \
          paste - - | \
          head -n 8 | \
          awk -F '\t' '{
            printf "{\"title\":\"%s\",\"link\":\"%s\"}\n", $1, $2
          }' | \
          jq -s '.' > data/news.json

      - name: Commit updated news.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/news.json
          git commit -m "Update CISA news" || echo "No changes to commit"
          git push
