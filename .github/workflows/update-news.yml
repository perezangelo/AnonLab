name: Update CISA News

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install tools
        run: sudo apt-get install -y xmlstarlet jq curl

      - name: Download CISA ATOM feed
        run: curl -s "https://www.cisa.gov/cybersecurity-advisories/all.xml" -o cisa.xml

      - name: Convert ATOM → JSON (namespace aware)
        run: |
          xmlstarlet sel \
            -N a="http://www.w3.org/2005/Atom" \
            -t -m "//a:entry" \
            -v "concat(a:title, '|||', a:id)" -n \
            cisa.xml | head -n 8 | \
          awk -F '|||' '{
            gsub(/"/, "\\\"", $1);
            gsub(/"/, "\\\"", $2);
            printf "{\"title\":\"%s\",\"link\":\"%s\"}\n", $1, $2
          }' | jq -s '.' > data/news.json

      - name: Commit updated news.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/news.json
          git commit -m "Update CISA news" || echo "No changes"
          git push
