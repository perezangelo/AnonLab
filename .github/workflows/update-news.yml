name: Update CISA News

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install feedparser
        run: pip install feedparser

      - name: DEBUG - Print first 80 lines of CISA feed
        run: |
          curl -s -A "Mozilla/5.0" "https://www.cisa.gov/cybersecurity-advisories/all.xml" > debug.xml
          echo "===== FEED CONTENT START ====="
          head -n 80 debug.xml
          echo "===== FEED CONTENT END ====="
        run: |
          python3 << 'EOF'
          import feedparser, json

          url = "https://www.cisa.gov/cybersecurity-advisories/all.xml"
          feed = feedparser.parse(url)

          news = []
          for entry in feed.entries[:8]:
              title = entry.title
              link = entry.link
              news.append({"title": title, "link": link})

          with open("data/news.json", "w") as f:
              json.dump(news, f, indent=2)
          EOF

      - name: Commit updated news.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/news.json
          git commit -m "Update CISA news" || echo "No changes"
          git push
