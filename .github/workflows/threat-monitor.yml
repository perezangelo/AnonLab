name: Sync Threat Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # aggiorna ogni 5 minuti
  workflow_dispatch:        # permette l'avvio manuale

jobs:
  update-threat-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Scarica threat-monitor.json da AlterVista
        run: |
          curl -o data/threat-monitor.json https://angelonline.altervista.org/data/threat-monitor.json

      - name: Commit & Push aggiornamento
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/threat-monitor.json
          git commit -m "Update threat-monitor.json" || echo "Nessun cambiamento"
          git push
