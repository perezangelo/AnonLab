name: Sync Threat Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  generate-threat-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Genera threat-monitor.json
        run: |
          GLOBAL=$((40 + RANDOM % 60))
          RANSOM=$((30 + RANDOM % 50))
          DDOS=$((20 + RANDOM % 70))
          PHISH=$((10 + RANDOM % 60))
          BOTNET=$((20 + RANDOM % 60))
          EXPLOIT=$((15 + RANDOM % 55))

          cat <<EOF > data/threat-monitor.json
          {
            "global": {
              "score": $GLOBAL,
              "riskLevel": "high",
              "trend": "rising"
            },
            "categories": {
              "ransomware": { "score": $RANSOM, "trend": "stable" },
              "ddos": { "score": $DDOS, "trend": "rising" },
              "phishing": { "score": $PHISH, "trend": "falling" },
              "botnet": { "score": $BOTNET, "trend": "rising" },
              "exploit": { "score": $EXPLOIT, "trend": "stable" }
            },
            "summary": {
              "activeThreats": 12,
              "criticalAlerts": 3,
              "highAlerts": 5,
              "mediumAlerts": 4
            },
            "timestamp": $(date +%s)
          }
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/threat-monitor.json
          git commit -m "Update threat-monitor.json" || echo "Nessun cambiamento"
          git push
