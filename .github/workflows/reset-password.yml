name: Reset Password

on:
  repository_dispatch:
    types: [reset_password]

jobs:
  reset-password:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup jq
        run: sudo apt-get install jq -y

      - name: Verifica token e aggiorna password
        id: update
        run: |
          TOKEN="${{ github.event.client_payload.token }}"
          HASH="${{ github.event.client_payload.password_hash }}"
          FILE="data/users.json"
          NOW=$(date +"%s")

          # Cerca utente con token valido
          USER=$(jq -r ".[] | select(.reset_token == \"$TOKEN\")" "$FILE")

          if [ -z "$USER" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          EXPIRE=$(jq -r ".[] | select(.reset_token == \"$TOKEN\") | .reset_expire" "$FILE")

          if [ "$NOW" -gt "$EXPIRE" ]; then
            echo "found=expired" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Aggiorna password e rimuovi token
          TMP=$(mktemp)
          jq "map(if .reset_token == \"$TOKEN\" then .password_hash = \"$HASH\" | .reset_token = null | .reset_expire = null else . end)" "$FILE" > "$TMP"
          mv "$TMP" "$FILE"

          echo "found=true" >> $GITHUB_OUTPUT

      - name: Commit & Push
        if: steps.update.outputs.found == 'true'
        env:
          TOKEN: ${{ secrets.USER_DB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/users.json
          git commit -m "Password aggiornata tramite reset token" || echo "Nessuna modifica"
          git push https://x-access-token:${TOKEN}@github.com/perezangelo/AnonLab.git main
