name: Update Ransom Groups

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-groups:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch Ransom Groups
        run: |
          curl -s https://ransomwatch-api.vercel.app/groups > datahub/groups.json

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Ransom Groups JSON"
