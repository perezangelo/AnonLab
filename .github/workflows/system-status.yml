name: Sync System Status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  generate-system-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Genera system-status.json
        run: |
          API_LATENCY=$((50 + RANDOM % 120))
          SERVER_LOAD=$((10 + RANDOM % 80))

          cat <<EOF > data/system-status.json
          {
            "server": {
              "status": "online",
              "load": $SERVER_LOAD
            },
            "api": {
              "status": "online",
              "latency": $API_LATENCY
            },
            "newsFeed": {
              "status": "online",
              "items": [
                "Aggiornamento sicurezza completato",
                "Monitoraggio rete attivo",
                "Nessuna anomalia rilevata"
              ]
            },
            "timestamp": $(date +%s)
          }
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/system-status.json
          git commit -m "Update system-status.json" || echo "Nessun cambiamento"
          git push
