    <script>
async function loadWeather() {
    const box = document.querySelector("#weather-box");
    const apiKey = "52a36e34ff786add4e46157670713029"; // da OpenWeatherMap
    const city = "Milano";

    try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=it`);
        const data = await res.json();

        box.innerHTML = `
            ${data.name}: ${data.main.temp}°C · ${data.weather[0].description}<br>
            Umidità: ${data.main.humidity}%<br>
            Vento: ${data.wind.speed} km/h
        `;
    } catch (e) {
        box.textContent = "Impossibile caricare il meteo.";
    }
}
loadWeather();
</script>
