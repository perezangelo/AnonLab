<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Operazione completata</title>
<link rel="stylesheet" href="/css/style.css">

<style>
  body {
    background: #000;
    color: #0f0;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .thankyou-box {
    text-align: center;
    padding: 40px;
    border: 1px solid #0f0;
    background: #050505;
    box-shadow: 0 0 15px #0f0;
    max-width: 400px;
  }

  .thankyou-box h2 {
    margin-bottom: 15px;
    color: #0f0;
  }

  .thankyou-box p {
    color: #8f8;
    font-size: 16px;
  }
</style>
</head>

<body>

<div class="thankyou-box">
  <h2>Operazione completata</h2>
  <p>Verrai reindirizzato alla home...</p>
</div>

<script>
  setTimeout(() => {
    window.location.href = "/";
  }, 3000);
</script>

</body>
</html>
