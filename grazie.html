<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Operazione completata</title>

<style>
    body {
        background:#000814;
        color:#00eaff;
        font-family:"Courier New", monospace;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .thankyou-box {
        text-align:center;
        padding:40px;
        border:1px solid #00eaff;
        background:#00111f;
        box-shadow:0 0 20px #00eaff55;
        max-width:420px;
        border-radius:8px;
    }

    .thankyou-box h2 {
        margin-bottom:15px;
        color:#00eaff;
        text-shadow:0 0 12px #00eaff;
        font-size:26px;
    }

    .thankyou-box p {
        color:#c8f7ff;
        font-size:16px;
        line-height:1.6;
    }
</style>
</head>

<body>

<div class="thankyou-box">
  <h2>Operazione completata</h2>
  <p>Verrai reindirizzato alla home...</p>
</div>

<script>
  setTimeout(() => {
    window.location.href = "/";
  }, 3000);
</script>

</body>
</html>
