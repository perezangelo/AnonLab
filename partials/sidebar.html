<!-- COUNTER -->
<div class="sidebar-box visit-box">
  <h3>Benvenuto su AnonLab</h3>

  <div class="visit-greeting" id="visit-greeting">Ciao!</div>

  <div class="visit-info">
    <strong>Visite totali:</strong>
    <span id="visit-counter">0</span>
  </div>

  <div class="visit-info">
    <strong>Pagine viste:</strong>
    <span id="page-counter">0</span>
  </div>

  <div class="visit-info">
    <strong>Data:</strong>
    <span id="visit-date">--/--/----</span>
  </div>

  <div class="visit-info">
    <strong>Ora:</strong>
    <span id="visit-time">--:--:--</span>
  </div>
</div>

<!-- RADIO -->
<div class="sidebar-box">
  <h3>Radio Live</h3>
  <select id="radioSelector">
    <option value="">Seleziona una radio</option>
    <option value="https://www.radio24.ilsole24ore.com/player/">Radio 24</option>
    <option value="https://www.rtl.it/live/">RTL 102.5</option>
    <option value="https://www.105.net/sezioni/il-player/">Radio 105</option>
  </select>
</div>

<!-- YOUTUBE PLAYER -->
<div class="sidebar-box">
  <h3>YouTube Player</h3>
  <select id="ytSelector">

    <option value="dQw4w9WgXcQ">Cybersecurity Basics</option>

</div>
